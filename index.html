<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">


    <title>20</title>
    <style>
        table {
            position: relative;
            top: 20px;
            left: 20px;
            border: 1px solid black;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }

        tr.row0 {
            background-color: gray;
        }

        tr.row0 th {
            color: aliceblue;
        }


        tr.row1 {
            background-color: yellow;
        }

        tr.row2 {
            background-color: white;
        }

        tr.row3 {
            background-color: yellow;
        }

        div {
            border: 5px solid green;
            position: fixed;
            top: 20px;
            right: 20px;
            width: 100px;
            height: 100px;
        }
    </style>

</head>

<body>
    <table>
        <tr class=row0>
            <th>Firstname</th>
            <th>Lastname</th>
        </tr>
        <tr class=row1>
            <td>1</td>
            <td>1</td>
        </tr>
        <tr class=row2>
            <td>2</td>
            <td>2</td>
        </tr>
        <tr class=row3>
            <td>3</td>
            <td>3</td>
        </tr>
    </table>
    <div>
        This div element has position: fixed;
    </div>


</body>

</html>
